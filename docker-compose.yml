version: '3.8'

services:
  uebki-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: uebki-bot
    depends_on:
      - uebki-db
    environment:
      - CLICKHOUSE_HOST=uebki-db
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=alohadancer123
    networks:
      - app-network

  uebki-db:
    image: clickhouse/clickhouse-server:latest
    container_name: uebki-db
    ports:
      - "8123:8123"  # HTTP интерфейс
    environment:
      - CLICKHOUSE_DB=uebki39bot
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=alohadancer123
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - ./database:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/custom.xml
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - app-network

networks:
  app-network:
    driver: bridge